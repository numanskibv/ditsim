# Datacenter-sim — productiestack (PostgreSQL) achter een TLS reverse proxy.
#
#     cp .env.docker.example .env   # eenmalig: vul de secrets in (zie dat bestand)
#     docker compose up --build -d
#
# Publieke URL: https://ditsim.mbouit.nl (reverse proxy → app op :8000,
# Reverb-websockets op :8080). Zie docs/reverse-proxy.md voor de proxyconfig.
#
# SECRETS staan NIET in dit bestand: APP_KEY, DB_PASSWORD, DEFAULT_ACCOUNT_PASSWORD
# en de REVERB_APP_*-credentials worden uit het (gitignored) .env geïnterpoleerd.
# Ontbreekt er één, dan stopt `docker compose` met een duidelijke melding.
#
# Clean start: deze stack boot LEEG (SEED_DEMO=false). Registreer het eerste
# account via de app — dat wordt automatisch de docent (beheerder). Wil je de
# MediCloud-demo met kant-en-klare accounts? Zet SEED_DEMO op "true".
#
# Data leeft in het named volume `pgdata` en overleeft herbouw/herstart.

x-app-env: &app-env
  APP_NAME: "Datacenter Sim"
  APP_ENV: production
  APP_DEBUG: "false"
  APP_KEY: "${APP_KEY:?Zet APP_KEY in .env (genereer met: php artisan key:generate --show)}"
  APP_URL: "https://ditsim.mbouit.nl"

  DB_CONNECTION: pgsql
  DB_HOST: db
  DB_PORT: "5432"
  DB_DATABASE: datacenter
  DB_USERNAME: datacenter
  DB_PASSWORD: "${DB_PASSWORD:?Zet DB_PASSWORD in .env}"

  # Schoon starten: geen demodata/-accounts. De eerste registratie wordt docent.
  # Zet op "true" voor de MediCloud-demo met kant-en-klare accounts.
  SEED_DEMO: "false"

  # Standaardwachtwoord voor (demo)accounts als SEED_DEMO=true. Uit .env.
  DEFAULT_ACCOUNT_PASSWORD: "${DEFAULT_ACCOUNT_PASSWORD:?Zet DEFAULT_ACCOUNT_PASSWORD in .env}"

  SESSION_DRIVER: database
  CACHE_STORE: database
  QUEUE_CONNECTION: database

  # Broadcasting → Reverb. App/queue bereiken de reverb-container op naam;
  # de browser bereikt 'm via het publieke domein (in de JS gebakken bij build).
  BROADCAST_CONNECTION: reverb
  REVERB_APP_ID: "${REVERB_APP_ID:?Zet REVERB_APP_ID in .env}"
  REVERB_APP_KEY: "${REVERB_APP_KEY:?Zet REVERB_APP_KEY in .env}"
  REVERB_APP_SECRET: "${REVERB_APP_SECRET:?Zet REVERB_APP_SECRET in .env}"
  REVERB_HOST: reverb
  REVERB_PORT: "8080"
  REVERB_SCHEME: http
  REVERB_SERVER_HOST: "0.0.0.0"
  REVERB_SERVER_PORT: "8080"

services:
  # PostgreSQL database (persistent, concurrency-safe).
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: datacenter
      POSTGRES_USER: datacenter
      POSTGRES_PASSWORD: "${DB_PASSWORD:?Zet DB_PASSWORD in .env}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datacenter -d datacenter"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # Web server (also runs the one-time migrate + seed via app:install).
  app:
    build:
      context: .
      args:
        VITE_REVERB_APP_KEY: "${REVERB_APP_KEY:?Zet REVERB_APP_KEY in .env}"
        VITE_REVERB_HOST: ditsim.mbouit.nl
        VITE_REVERB_PORT: "443"
        VITE_REVERB_SCHEME: https
    image: datacenter-sim
    environment:
      <<: *app-env
      RUN_MIGRATIONS: "1"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "exit((int) (@file_get_contents('http://127.0.0.1:8000/up') === false));"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  # Realtime websocket server.
  reverb:
    image: datacenter-sim
    environment:
      <<: *app-env
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    ports:
      - "8080:8080"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  # Queue worker — processes scenario jobs AND broadcast events.
  queue:
    image: datacenter-sim
    environment:
      <<: *app-env
    command: ["php", "artisan", "queue:work", "--tries=3", "--sleep=1", "--timeout=0"]
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  # Scheduler — runs simulate:tick every minute.
  scheduler:
    image: datacenter-sim
    environment:
      <<: *app-env
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
